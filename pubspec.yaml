name: ai_fitness_coach
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mlkit_pose_detection: ^0.12.0
  path_provider: ^2.1.2

  # Navigation
  go_router: ^12.0.0

  # State Management
  flutter_riverpod: ^2.0.0

  # UI & Animation
  flutter_animate: ^4.0.0
  lottie: ^2.0.0
  fl_chart: ^0.65.0
  google_fonts: ^6.0.0
  shimmer: ^3.0.0
  percent_indicator: ^4.0.0

  # Storage
  shared_preferences: ^2.0.0
  hive_flutter: ^1.1.0

  # Camera
  camera: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/fonts/
    - assets/animations/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
